name: TypeScript/Node CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Debug - Environment
        run: |
          echo "📋 Node.js Info:"
          node --version
          npm --version
          echo ""
          echo "📂 Project structure:"
          ls -la packages/sdk-node/
          echo ""
          echo "📋 package.json (root):"
          head -20 package.json

      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies..."
          npm ci --verbose
          echo "✅ Dependencies installed"
          npm ls --depth=0

      - name: Lint TypeScript
        run: |
          echo "🔍 Linting TypeScript..."
          npm run lint --workspaces --verbose
          echo "✅ Linting complete"

      - name: Type check
        run: |
          echo "🔎 Type checking..."
          npm run type-check --workspaces --verbose
          echo "✅ Type checking complete"

      - name: Build
        run: |
          echo "🔨 Building packages..."
          npm run build --workspaces --verbose
          echo "✅ Build complete"
          echo ""
          echo "📁 Build artifacts:"
          find packages -name "dist" -type d -exec ls -lah {} \;

      - name: Run tests
        run: |
          echo "🧪 Running tests..."
          npm run test --workspaces --if-present || echo "No tests defined"
          echo "✅ Tests complete"

  coverage:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Debug - Environment
        run: |
          echo "📋 Coverage job info:"
          echo "  Node: $(node --version)"
          echo "  npm: $(npm --version)"

      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies..."
          npm ci
          echo "✅ Dependencies installed"

      - name: Generate coverage
        run: |
          echo "📊 Generating coverage reports..."
          npm run test:coverage --workspaces --if-present || echo "No coverage tests defined"
          echo "✅ Coverage generation complete"
          echo ""
          echo "📁 Coverage reports:"
          find . -name "lcov.info" -o -name "coverage" -type d

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
