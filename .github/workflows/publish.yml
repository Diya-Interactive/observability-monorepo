name: Publish Packages

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Debug - Environment
        run: |
          echo "📋 GitHub Context:"
          echo "  Event: ${{ github.event_name }}"
          echo "  Ref: ${{ github.ref }}"
          echo "  Tag: ${GITHUB_REF#refs/tags/}"
          echo ""
          echo "🔍 Node/npm Info:"
          node --version
          npm --version
          npm whoami || echo "Not logged in yet"

      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies..."
          npm ci --verbose
          echo "✅ Dependencies installed"
          npm ls --depth=0

      - name: Build
        run: |
          echo "🔨 Building packages..."
          npm run build --workspaces --verbose
          echo "✅ Build complete"
          echo ""
          echo "📁 Build artifacts:"
          find . -name "dist" -type d 2>/dev/null | head -5

      - name: Publish to npm
        run: |
          echo "🚀 Publishing to npm..."
          echo "  NPM_TOKEN length: ${#NPM_TOKEN}"
          echo "  Registry: ${NPM_CONFIG_REGISTRY:-https://registry.npmjs.org/}"
          npm publish -w @your-org/observability --verbose
          echo "✅ Published @your-org/observability"
          npm publish -w @your-org/observability-cli --verbose
          echo "✅ Published @your-org/observability-cli"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Debug - Environment
        run: |
          echo "🐍 Python Info:"
          python --version
          pip --version
          echo ""
          echo "📂 Project structure:"
          ls -la packages/sdk-python/

      - name: Install build tools
        run: |
          echo "📦 Installing build tools..."
          python -m pip install --upgrade pip
          pip install build twine --verbose
          echo "✅ Build tools installed"
          pip list | grep -E "build|twine"

      - name: Build distribution
        run: |
          cd packages/sdk-python
          echo "🔨 Building Python distribution..."
          python -m build --verbose
          echo "✅ Build complete"
          echo ""
          echo "📁 Build artifacts:"
          ls -lah dist/

      - name: Publish to PyPI
        run: |
          cd packages/sdk-python
          echo "🚀 Publishing to PyPI..."
          echo "  PYPI_TOKEN length: ${#PYPI_TOKEN}"
          twine check dist/*
          twine upload dist/* -u __token__ -p "$PYPI_TOKEN" --verbose
          echo "✅ Published to PyPI"
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}

  publish-nuget:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Debug - Environment
        run: |
          echo "📋 .NET Info:"
          dotnet --version
          dotnet --list-sdks
          dotnet --list-runtimes
          echo ""
          echo "📂 Project structure:"
          ls -la packages/sdk-dotnet/
          echo ""
          echo "📄 Project file contents:"
          head -30 packages/sdk-dotnet/YourOrg.Observability.csproj

      - name: Restore dependencies
        run: |
          cd packages/sdk-dotnet
          echo "📦 Restoring dependencies..."
          dotnet restore --verbosity detailed
          echo "✅ Dependencies restored"

      - name: Build
        run: |
          cd packages/sdk-dotnet
          echo "🔨 Building .NET package..."
          dotnet build --configuration Release --no-restore --verbosity detailed
          echo "✅ Build complete"

      - name: Pack
        run: |
          cd packages/sdk-dotnet
          echo "📦 Packing NuGet package..."
          dotnet pack --configuration Release --output ./nupkg --verbosity detailed
          echo "✅ Pack complete"
          echo ""
          echo "📁 NuGet artifacts:"
          ls -lah nupkg/

      - name: Publish to NuGet
        run: |
          cd packages/sdk-dotnet
          echo "🚀 Publishing to NuGet..."
          echo "  NUGET_TOKEN length: ${#NUGET_TOKEN}"
          dotnet nuget push "**/nupkg/*.nupkg" \
            --api-key "$NUGET_TOKEN" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate \
            --verbosity detailed
          echo "✅ Published to NuGet"
        env:
          NUGET_TOKEN: ${{ secrets.NUGET_TOKEN }}

  create-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: [publish-npm, publish-pypi, publish-nuget]

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
