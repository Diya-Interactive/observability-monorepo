name: .NET CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/sdk-dotnet/**'
      - '.github/workflows/dotnet-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/sdk-dotnet/**'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ['8.0.x']

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Debug - Environment
        run: |
          echo "📋 .NET Info:"
          dotnet --version
          dotnet --list-sdks
          echo ""
          echo "📂 Project structure:"
          ls -la packages/sdk-dotnet/
          echo ""
          echo "📋 Project file (first 35 lines):"
          head -35 packages/sdk-dotnet/YourOrg.Observability.csproj

      - name: Restore dependencies
        run: |
          cd packages/sdk-dotnet
          echo "📦 Restoring dependencies..."
          dotnet restore --verbosity detailed
          echo "✅ Dependencies restored"

      - name: Build
        run: |
          cd packages/sdk-dotnet
          echo "🔨 Building .NET SDK..."
          dotnet build --configuration Release --no-restore --verbosity detailed
          echo "✅ Build complete"

      - name: Run tests
        run: |
          cd packages/sdk-dotnet
          echo "🧪 Running tests..."
          dotnet test --configuration Release --no-build --verbosity detailed || echo "No tests found (optional)"
          echo "✅ Tests complete"

      - name: Pack NuGet package
        run: |
          cd packages/sdk-dotnet
          echo "📦 Packing NuGet package..."
          dotnet pack --configuration Release --output ./nupkg --verbosity detailed
          echo "✅ Pack complete"
          echo ""
          echo "📁 NuGet artifacts:"
          ls -lah nupkg/

      - name: Upload NuGet package
        uses: actions/upload-artifact@v3
        with:
          name: nuget-package
          path: packages/sdk-dotnet/nupkg/
